<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATH 24</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  THEME: change DEFAULT_THEME in the script block below.  ║
  ║  Options: midnight · cream · slate · chalk · mint · paper║
  ╚══════════════════════════════════════════════════════════╝
-->
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

[data-theme="midnight"]{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;--accent:#f0c040;--accent2:#e05a5a;--accent3:#5ab4e0;--accent4:#5ae08a;--accent5:#c45ae0;--text:#f0eff8;--text-dim:#7a7a9a;--card1:linear-gradient(135deg,#1e1030,#0f0820);--card2:linear-gradient(135deg,#0e2030,#081020);--card3:linear-gradient(135deg,#1e1010,#200808);--card4:linear-gradient(135deg,#0e2010,#082008);--overlay-bg:rgba(10,10,15,0.93);--btn-text:#0a0a0f;--glow1:rgba(240,192,64,0.06);--glow2:rgba(90,180,224,0.05);}
[data-theme="cream"]{--bg:#faf7f2;--surface:#f2ede4;--surface2:#e8e0d4;--border:#d8cfc2;--accent:#e8601c;--accent2:#c0392b;--accent3:#2980b9;--accent4:#27ae60;--accent5:#8e44ad;--text:#1a1a18;--text-dim:#8a7f72;--card1:linear-gradient(135deg,#f5ede0,#ede0cc);--card2:linear-gradient(135deg,#e8f0f5,#d8e8f0);--card3:linear-gradient(135deg,#f5e8e0,#f0d8cc);--card4:linear-gradient(135deg,#e8f5ec,#d8eedd);--overlay-bg:rgba(250,247,242,0.95);--btn-text:#ffffff;--glow1:rgba(232,96,28,0.05);--glow2:rgba(41,128,185,0.04);}
[data-theme="slate"]{--bg:#f4f6f8;--surface:#ffffff;--surface2:#eaecf0;--border:#d0d5dd;--accent:#2563eb;--accent2:#dc2626;--accent3:#0891b2;--accent4:#16a34a;--accent5:#7c3aed;--text:#1e293b;--text-dim:#64748b;--card1:linear-gradient(135deg,#eff6ff,#dbeafe);--card2:linear-gradient(135deg,#f0fdf4,#dcfce7);--card3:linear-gradient(135deg,#fef2f2,#fee2e2);--card4:linear-gradient(135deg,#faf5ff,#f3e8ff);--overlay-bg:rgba(244,246,248,0.96);--btn-text:#ffffff;--glow1:rgba(37,99,235,0.05);--glow2:rgba(8,145,178,0.04);}
[data-theme="chalk"]{--bg:#fffef7;--surface:#f8f5e8;--surface2:#f0ead4;--border:#e0d8b8;--accent:#c9900a;--accent2:#c0392b;--accent3:#2471a3;--accent4:#1e8449;--accent5:#76448a;--text:#2c2410;--text-dim:#8a7a4a;--card1:linear-gradient(135deg,#fdf5d8,#f8ecb8);--card2:linear-gradient(135deg,#dff0f8,#c8e4f4);--card3:linear-gradient(135deg,#fde8d8,#f8d8b8);--card4:linear-gradient(135deg,#dff8e8,#c8f0d4);--overlay-bg:rgba(255,254,247,0.96);--btn-text:#ffffff;--glow1:rgba(201,144,10,0.07);--glow2:rgba(36,113,163,0.05);}
[data-theme="mint"]{--bg:#f0faf5;--surface:#ffffff;--surface2:#e0f5eb;--border:#b8e8d0;--accent:#059669;--accent2:#dc2626;--accent3:#0284c7;--accent4:#16a34a;--accent5:#7c3aed;--text:#1a2e22;--text-dim:#4a7a5e;--card1:linear-gradient(135deg,#f0f0ff,#e0e0f8);--card2:linear-gradient(135deg,#e8f8f0,#d0f0e0);--card3:linear-gradient(135deg,#fff0f0,#ffe0e0);--card4:linear-gradient(135deg,#f8f0ff,#eed8ff);--overlay-bg:rgba(240,250,245,0.96);--btn-text:#ffffff;--glow1:rgba(5,150,105,0.06);--glow2:rgba(2,132,199,0.04);}
[data-theme="paper"]{--bg:#f8f8f6;--surface:#ffffff;--surface2:#f0f0ee;--border:#ddddd8;--accent:#18181b;--accent2:#e11d48;--accent3:#0ea5e9;--accent4:#22c55e;--accent5:#a855f7;--text:#18181b;--text-dim:#71717a;--card1:linear-gradient(135deg,#f4f4f8,#eaeaef);--card2:linear-gradient(135deg,#f0f8ff,#e0f0ff);--card3:linear-gradient(135deg,#fff0f4,#ffe0e8);--card4:linear-gradient(135deg,#f0fff4,#e0ffec);--overlay-bg:rgba(248,248,246,0.96);--btn-text:#ffffff;--glow1:rgba(24,24,27,0.03);--glow2:rgba(14,165,233,0.04);}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,var(--glow1) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,var(--glow2) 0%,transparent 50%);pointer-events:none;z-index:0;}

.app{width:100%;max-width:480px;min-height:100dvh;display:flex;flex-direction:column;padding:0 16px 32px;position:relative;z-index:1;}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.06em;line-height:1;color:var(--accent);}
.logo span{color:var(--text-dim);font-size:1.4rem;margin-left:4px;vertical-align:middle;}
.header-right{display:flex;align-items:center;gap:10px;}
.score-badge{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.score-label{font-size:.62rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
.score-val{font-family:'DM Mono',monospace;font-size:1.4rem;color:var(--accent);font-weight:500;}
.theme-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0;}
.theme-btn:active{transform:scale(.92);}

/* THEME PANEL */
.theme-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--surface);border:1.5px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;padding:20px 20px 36px;z-index:300;transition:transform .32s cubic-bezier(.34,1.56,.64,1);}
.theme-panel.open{transform:translateX(-50%) translateY(0);}
.theme-panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.theme-panel-title{font-size:.65rem;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.theme-option{border-radius:12px;border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:all .15s;}
.theme-option.current{border-color:var(--accent);}
.theme-option:active{transform:scale(.97);}
.theme-swatches{display:flex;height:36px;}
.theme-swatch{flex:1;}
.theme-name{font-size:.68rem;font-weight:600;color:var(--text);padding:6px 8px 7px;background:var(--surface2);text-align:center;}
.theme-panel-backdrop{position:fixed;inset:0;z-index:299;display:none;}
.theme-panel-backdrop.open{display:block;}

/* TIER */
.tier-section{margin-bottom:10px;}
.section-label{font-size:.6rem;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
.tier-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.tier-scroll::-webkit-scrollbar{display:none;}
.tier-btn{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .18s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tier-btn .tier-range{font-size:.58rem;opacity:.65;font-weight:400;}
.tier-btn.active{background:var(--accent);border-color:var(--accent);color:var(--btn-text);}
.tier-btn.frac-btn.active{background:var(--accent5);border-color:var(--accent5);color:#fff;}
.tier-btn:not(.active):active{transform:scale(.96);}

/* TARGET TOGGLE */
.target-toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.toggle-label{font-size:.62rem;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;flex:1;}
.toggle-track{position:relative;width:120px;height:32px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;display:flex;cursor:pointer;overflow:hidden;user-select:none;}
.toggle-thumb{position:absolute;top:2px;bottom:2px;left:2px;width:calc(50% - 2px);background:var(--accent);border-radius:7px;transition:transform .22s cubic-bezier(.34,1.56,.64,1);z-index:0;}
.toggle-thumb.right{transform:translateX(calc(100% + 2px));}
.toggle-option{flex:1;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;position:relative;z-index:1;transition:color .2s;color:var(--text-dim);}
.toggle-option.active{color:var(--btn-text);}

/* TARGET */
.target-display{text-align:center;margin-bottom:12px;}
.target-label{font-size:.65rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px;}
.target-number{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:1;color:var(--accent);transition:all .3s;}

/* QUALITY */
.quality-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;min-height:18px;flex-wrap:wrap;}
.quality-dots{display:flex;gap:4px;}
.q-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .3s;}
.q-dot.filled{background:var(--accent2);}
.q-dot.filled.mid{background:var(--accent);}
.q-dot.filled.high{background:var(--accent4);}
.quality-label{font-size:.6rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.solutions-badge{font-size:.6rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.fraction-badge{font-size:.58rem;background:color-mix(in srgb,var(--accent5) 15%,transparent);color:var(--accent5);border:1px solid color-mix(in srgb,var(--accent5) 35%,transparent);border-radius:6px;padding:2px 7px;letter-spacing:.06em;text-transform:uppercase;}

/* TIMER */
.timer-wrap{margin-bottom:12px;}
.timer-track{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.timer-bar{height:100%;border-radius:4px;background:var(--accent4);transition:width 1s linear,background .5s;width:100%;}
.timer-bar.warn{background:var(--accent2);}
.timer-row{display:flex;justify-content:space-between;margin-top:5px;}
.timer-text{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-dim);}
.puzzle-count{font-size:.65rem;color:var(--text-dim);font-family:'DM Mono',monospace;}

/* ═══════ WHEEL ═══════ */
.wheel-wrap{position:relative;width:100%;aspect-ratio:1;max-height:270px;margin:0 auto 14px;touch-action:none;user-select:none;flex-shrink:0;}
.wheel-ring{position:absolute;inset:0;border-radius:50%;border:1.5px dashed color-mix(in srgb,var(--border) 55%,transparent);pointer-events:none;}

.wheel-card{
  position:absolute;
  border-radius:18px;
  border:2.5px solid var(--border);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:border-color .15s,opacity .2s,box-shadow .15s;
  overflow:hidden;
}
.wheel-card.origin-0{background:var(--card1);}
.wheel-card.origin-1{background:var(--card2);}
.wheel-card.origin-2{background:var(--card3);}
.wheel-card.origin-3{background:var(--card4);}
.wheel-card.intermediate{background:color-mix(in srgb,var(--accent3) 12%,var(--surface));border-color:color-mix(in srgb,var(--accent3) 45%,var(--border));}
.wheel-card.selected{border-color:var(--accent) !important;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%,transparent);}
.wheel-card.consumed{opacity:.2;pointer-events:none;}
.wheel-card.empty{opacity:0;pointer-events:none;}

.card-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:3rem;
  line-height:1;
  color:var(--text);
  display:block;
}
/* underline only digit 6 and 9 to distinguish them */
.card-num.underline69{
  text-decoration:underline;
  text-underline-offset:4px;
  text-decoration-thickness:2.5px;
}
.card-origin{font-size:.46rem;color:var(--text-dim);margin-top:3px;line-height:1;text-align:center;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* STEP HISTORY */
.step-history{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.step-row{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text-dim);padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;animation:stepIn .2s ease both;}
.step-row .step-expr{flex:1;color:var(--text);}
.step-row .step-result{color:var(--accent3);font-weight:500;}
@keyframes stepIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

/* EXPRESSION */
.expr-area{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px;margin-bottom:9px;min-height:50px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.expr-token{font-family:'DM Mono',monospace;font-size:1.15rem;font-weight:500;padding:3px 9px;border-radius:8px;cursor:pointer;transition:all .12s;}
.expr-token.number{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 28%,transparent);}
.expr-token.operator{background:color-mix(in srgb,var(--accent3) 12%,transparent);color:var(--accent3);border:1px solid color-mix(in srgb,var(--accent3) 25%,transparent);}
.expr-token:active{opacity:.6;transform:scale(.94);}
.expr-placeholder{color:var(--text-dim);font-size:.8rem;font-style:italic;}

/* OPS */
.ops-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:9px;}
.op-btn{padding:11px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--accent3);font-family:'DM Mono',monospace;font-size:1.15rem;cursor:pointer;transition:all .13s cubic-bezier(.34,1.56,.64,1);text-align:center;}
.op-btn:active{transform:scale(.92);background:var(--surface2);}
.op-btn.eq-btn{background:var(--accent);color:var(--btn-text);border-color:var(--accent);font-size:1.3rem;}
.op-btn.eq-btn:active{opacity:.85;transform:scale(.94);}

/* ACTIONS */
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px;}
.action-row-2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.action-btn{padding:11px 6px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .13s;}
.btn-clear{background:color-mix(in srgb,var(--accent2) 13%,transparent);color:var(--accent2);border:1.5px solid color-mix(in srgb,var(--accent2) 28%,transparent);}
.btn-reset{background:color-mix(in srgb,var(--accent2) 22%,transparent);color:var(--accent2);border:1.5px solid color-mix(in srgb,var(--accent2) 40%,transparent);}
.btn-hint{background:color-mix(in srgb,var(--accent4) 12%,transparent);color:var(--accent4);border:1.5px solid color-mix(in srgb,var(--accent4) 28%,transparent);}
.btn-new{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1.5px solid color-mix(in srgb,var(--accent) 28%,transparent);}
.btn-solve{background:color-mix(in srgb,var(--accent3) 12%,transparent);color:var(--accent3);border:1.5px solid color-mix(in srgb,var(--accent3) 28%,transparent);}
.action-btn:active{transform:scale(.96);opacity:.85;}
.action-btn:disabled{opacity:.3;cursor:default;transform:none;}

/* FEEDBACK */
.feedback{text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:.84rem;border-radius:10px;transition:all .25s;opacity:0;margin-bottom:8px;padding:0 12px;}
.feedback.show{opacity:1;}
.feedback.correct{background:color-mix(in srgb,var(--accent4) 12%,transparent);color:var(--accent4);border:1px solid color-mix(in srgb,var(--accent4) 28%,transparent);}
.feedback.wrong{background:color-mix(in srgb,var(--accent2) 10%,transparent);color:var(--accent2);border:1px solid color-mix(in srgb,var(--accent2) 28%,transparent);}
.feedback.info{background:color-mix(in srgb,var(--accent3) 10%,transparent);color:var(--accent3);border:1px solid color-mix(in srgb,var(--accent3) 25%,transparent);}

/* STATS */
.stats-row{display:flex;gap:7px;margin-top:auto;padding-top:6px;}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 6px;text-align:center;}
.stat-val{font-family:'DM Mono',monospace;font-size:1.2rem;color:var(--text);}
.stat-label{font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .35s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--accent);}
.loading-bar-track{width:180px;height:3px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.loading-bar{height:100%;background:var(--accent);border-radius:3px;animation:loadPulse 1.4s ease-in-out infinite;}
@keyframes loadPulse{0%{width:0%;margin-left:0;}50%{width:70%;margin-left:15%;}100%{width:0%;margin-left:100%;}}
.loading-msg{font-size:.78rem;color:var(--text-dim);}

/* SOLVED */
.solved-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(10px);padding:24px;}
.solved-overlay.show{opacity:1;pointer-events:all;}
.solved-title{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;color:var(--accent);}
.solved-steps{width:100%;max-width:340px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);line-height:1.9;}
.solved-steps .final-line{color:var(--accent);font-weight:500;}
.solved-meta{font-size:.82rem;color:var(--text-dim);text-align:center;line-height:1.5;}
.solved-meta strong{color:var(--accent);}
.solved-alts{width:100%;max-width:340px;}
.solved-alts-label{font-size:.58rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;text-align:center;}
.alt-soln{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--text-dim);background:var(--surface);padding:7px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:5px;text-align:center;}
.overlay-btn{margin-top:4px;padding:13px 36px;border-radius:14px;border:none;background:var(--accent);color:var(--btn-text);font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:transform .13s;}
.overlay-btn:active{transform:scale(.97);}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 22px;font-size:.85rem;font-weight:500;color:var(--text);z-index:100;transition:transform .32s cubic-bezier(.34,1.56,.64,1);max-width:88vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}

@keyframes celebrate{0%{transform:scale(1);}30%{transform:scale(1.08);}60%{transform:scale(.97);}100%{transform:scale(1);}}
@keyframes fireAnim{from{transform:scale(1);}to{transform:scale(1.22) rotate(5deg);}}
.celebrate{animation:celebrate .48s ease;}
.fire-hot{animation:fireAnim .5s ease infinite alternate;display:inline-block;}
.no-puzzles-msg{text-align:center;padding:28px 12px;color:var(--text-dim);font-size:.85rem;line-height:1.65;}
.no-puzzles-msg strong{color:var(--accent);display:block;font-size:1rem;margin-bottom:8px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">MATH 24</div>
  <div class="loading-bar-track"><div class="loading-bar"></div></div>
  <div class="loading-msg" id="loadingMsg">Loading puzzles…</div>
</div>

<div class="app">
  <header>
    <div class="logo">MATH<span id="logoTarget">24</span></div>
    <div class="header-right">
      <div class="score-badge">
        <div class="score-label">Score</div>
        <div class="score-val" id="scoreDisplay">0</div>
      </div>
      <button class="theme-btn" onclick="openThemePanel()" title="Change theme">🎨</button>
    </div>
  </header>

  <div class="tier-section">
    <div class="section-label">Difficulty</div>
    <div class="tier-scroll">
      <button class="tier-btn active"   data-tier="easy"     onclick="setTier('easy')">Easy<span class="tier-range">1–9</span></button>
      <button class="tier-btn"          data-tier="medium"   onclick="setTier('medium')">Medium<span class="tier-range">1–19</span></button>
      <button class="tier-btn"          data-tier="hard"     onclick="setTier('hard')">Hard<span class="tier-range">1–29</span></button>
      <button class="tier-btn"          data-tier="expert"   onclick="setTier('expert')">Expert<span class="tier-range">1–49</span></button>
      <button class="tier-btn"          data-tier="extreme"  onclick="setTier('extreme')">Extreme<span class="tier-range">1–49</span></button>
      <button class="tier-btn frac-btn" data-tier="fraction" onclick="setTier('fraction')">Fraction<span class="tier-range">∞</span></button>
    </div>
  </div>

  <div class="target-toggle-row">
    <div class="toggle-label">Target Number</div>
    <div class="toggle-track" onclick="toggleTarget()">
      <div class="toggle-thumb" id="toggleThumb"></div>
      <div class="toggle-option active" id="opt24">24</div>
      <div class="toggle-option"        id="opt60">60</div>
    </div>
  </div>

  <div class="target-display">
    <div class="target-label">Make This Number</div>
    <div class="target-number" id="targetDisplay">24</div>
    <div class="quality-row">
      <div class="quality-dots"    id="qualityDots"></div>
      <div class="quality-label"   id="qualityLabel"></div>
      <div class="solutions-badge" id="solutionsBadge"></div>
      <div class="fraction-badge"  id="fractionBadge" style="display:none">Fractions</div>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="timer-track"><div class="timer-bar" id="timerBar"></div></div>
    <div class="timer-row">
      <div class="timer-text"   id="timerText">90s</div>
      <div class="puzzle-count" id="puzzleCount"></div>
    </div>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="wheel-ring"></div>
  </div>

  <div class="step-history" id="stepHistory"></div>

  <div class="expr-area" id="exprArea">
    <span class="expr-placeholder">Tap a number, then an operator, then another number…</span>
  </div>

  <div class="ops-row">
    <button class="op-btn" onclick="addOp('+')">+</button>
    <button class="op-btn" onclick="addOp('−')">−</button>
    <button class="op-btn" onclick="addOp('×')">×</button>
    <button class="op-btn" onclick="addOp('÷')">÷</button>
    <button class="op-btn eq-btn" onclick="commitStep()">=</button>
  </div>

  <div class="action-row">
    <button class="action-btn btn-clear" onclick="clearStep()">Clear Step</button>
    <button class="action-btn btn-reset" onclick="resetAll()">Reset All</button>
    <button class="action-btn btn-hint"  onclick="showHint()">Hint</button>
  </div>
  <div class="action-row-2">
    <button class="action-btn btn-new"   onclick="newPuzzle()">New Puzzle</button>
    <button class="action-btn btn-solve" onclick="showSolution()">Solution</button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="solvedStat">0</div><div class="stat-label">Solved</div></div>
    <div class="stat-card"><div class="stat-val" id="streakStat">0 🔥</div><div class="stat-label">Streak</div></div>
    <div class="stat-card"><div class="stat-val" id="bestStat">--</div><div class="stat-label">Best</div></div>
  </div>
</div>

<div class="theme-panel-backdrop" id="themePanelBackdrop" onclick="closeThemePanel()"></div>
<div class="theme-panel" id="themePanel">
  <div class="theme-panel-handle"></div>
  <div class="theme-panel-title">Choose Theme</div>
  <div class="theme-grid" id="themeGrid"></div>
</div>

<div class="solved-overlay" id="solvedOverlay">
  <div class="solved-title">SOLVED! 🎉</div>
  <div class="solved-steps" id="solvedSteps"></div>
  <div class="solved-meta"  id="solvedMeta"></div>
  <div class="solved-alts"  id="solvedAlts"></div>
  <button class="overlay-btn" onclick="nextPuzzle()">Next Puzzle →</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════
const DEFAULT_THEME = 'midnight';
const THEMES={midnight:{label:'Midnight',swatches:['#0a0a0f','#13131a','#f0c040','#e05a5a','#5ab4e0']},cream:{label:'Cream',swatches:['#faf7f2','#f2ede4','#e8601c','#1a1a18','#27ae60']},slate:{label:'Slate',swatches:['#f4f6f8','#ffffff','#2563eb','#1e293b','#16a34a']},chalk:{label:'Chalk',swatches:['#fffef7','#f8f5e8','#c9900a','#2c2410','#1e8449']},mint:{label:'Mint',swatches:['#f0faf5','#ffffff','#059669','#1a2e22','#7c3aed']},paper:{label:'Paper',swatches:['#f8f8f6','#ffffff','#18181b','#e11d48','#0ea5e9']}};
let activeTheme=DEFAULT_THEME;
function applyTheme(k){activeTheme=k;document.body.setAttribute('data-theme',k);localStorage.setItem('math24_theme',k);renderThemeGrid();}
function openThemePanel(){document.getElementById('themePanel').classList.add('open');document.getElementById('themePanelBackdrop').classList.add('open');}
function closeThemePanel(){document.getElementById('themePanel').classList.remove('open');document.getElementById('themePanelBackdrop').classList.remove('open');}
function renderThemeGrid(){const g=document.getElementById('themeGrid');g.innerHTML='';Object.entries(THEMES).forEach(([k,d])=>{const o=document.createElement('div');o.className=`theme-option${k===activeTheme?' current':''}`;o.innerHTML=`<div class="theme-swatches">${d.swatches.map(c=>`<div class="theme-swatch" style="background:${c}"></div>`).join('')}</div><div class="theme-name">${d.label}</div>`;o.addEventListener('click',()=>{applyTheme(k);closeThemePanel();});g.appendChild(o);});}

// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const TIERS={easy:{label:'Easy'},medium:{label:'Medium'},hard:{label:'Hard'},expert:{label:'Expert'},extreme:{label:'Extreme'},fraction:{label:'Fraction'}};
const RANGES={easy:[1,9],medium:[1,19],hard:[1,29],expert:[1,49],extreme:[1,49],fraction:[1,9]};
function puzzleFile(t,g){return(g===60?'puzzles_t60_':'puzzles_')+t+'.json';}

// ═══════════════════════════════════════════════════════════
//  TILE MODEL
// ═══════════════════════════════════════════════════════════
let tiles=[],expression=[],stepHistory=[],tileIdSeq=0;
function makeTile(value,display,originLabel,isIntermediate){return{id:tileIdSeq++,value,display,originLabel:originLabel||'',consumed:false,isIntermediate:!!isIntermediate,empty:false};}
function formatValue(v){if(!isFinite(v))return'?';if(Number.isInteger(v))return String(v);return parseFloat(v.toFixed(2)).toString();}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const cache={},played={};
let currentTier='easy',currentTarget=24,currentPuzzle=null;
let hintUsed=false,solveUsed=false,score=0,solved=0,streak=0,bestTime=null;
let timerInterval=null,timeLeft=90,puzzleStartTime=null;

// Wheel physics
let wheelAngle=0,wheelVel=0,dragActive=false,wasDrag=false;
let dragLastAngle=0,dragLastTime=0,rafId=null;

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
async function boot(){
  const saved=localStorage.getItem('math24_theme');
  applyTheme((saved&&THEMES[saved])?saved:DEFAULT_THEME);
  renderThemeGrid();
  await loadTier(currentTier,currentTarget);
  hideLoading();
  newPuzzle();
  initWheelDrag();
}

// ═══════════════════════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════════════════════
function cacheKey(t,g){return`${t}_${g}`;}
async function loadTier(tier,target){
  const key=cacheKey(tier,target);
  if(cache[key])return;
  setLoadingMsg(`Loading ${TIERS[tier]?.label||tier} puzzles…`);
  try{
    const r=await fetch(puzzleFile(tier,target));
    if(!r.ok)throw 0;
    cache[key]=(await r.json()).filter(p=>p.q>=20);
    played[key]=new Set();
  }catch{cache[key]=buildFallback(tier,target);played[key]=new Set();}
}
function buildFallback(tier,target){const[lo,hi]=RANGES[tier]||[1,9];const out=[];let t=0;while(out.length<40&&t<8000){t++;const n=Array.from({length:4},()=>rnd(lo,hi));const s=quickSolve(n,target);if(s)out.push({n,s:[s],c:1,q:50,f:false});}return out;}
function rnd(lo,hi){return Math.floor(Math.random()*(hi-lo+1))+lo;}
function quickSolve(nums,target){const ops=['+','-','*','/'];for(const p of perms(nums)){const[a,b,c,d]=p;for(const o1 of ops)for(const o2 of ops)for(const o3 of ops){for(const e of[`((${a}${o1}${b})${o2}${c})${o3}${d}`,`(${a}${o1}(${b}${o2}${c}))${o3}${d}`,`(${a}${o1}${b})${o2}(${c}${o3}${d})`,`${a}${o1}((${b}${o2}${c})${o3}${d})`,`${a}${o1}(${b}${o2}(${c}${o3}${d}))`]){try{if(Math.abs(safeEval(e)-target)<1e-9)return e.replace(/\*/g,'×').replace(/\//g,'÷').replace(/-/g,'−');}catch{}}}}return null;}
function perms(a){if(a.length<=1)return[a];const r=[];for(let i=0;i<a.length;i++){const rest=[...a.slice(0,i),...a.slice(i+1)];for(const p of perms(rest))r.push([a[i],...p]);}return r;}

// ═══════════════════════════════════════════════════════════
//  TIER / TARGET
// ═══════════════════════════════════════════════════════════
async function setTier(tier){if(tier===currentTier)return;currentTier=tier;document.querySelectorAll('.tier-btn').forEach(b=>b.classList.toggle('active',b.dataset.tier===tier));showLoading();await loadTier(tier,currentTarget);hideLoading();newPuzzle();}
async function toggleTarget(){currentTarget=currentTarget===24?60:24;const is60=currentTarget===60;document.getElementById('toggleThumb').classList.toggle('right',is60);document.getElementById('opt24').classList.toggle('active',!is60);document.getElementById('opt60').classList.toggle('active',is60);document.getElementById('targetDisplay').textContent=currentTarget;document.getElementById('logoTarget').textContent=currentTarget;showLoading();await loadTier(currentTier,currentTarget);hideLoading();newPuzzle();}

// ═══════════════════════════════════════════════════════════
//  PICK
// ═══════════════════════════════════════════════════════════
function pickPuzzle(){const key=cacheKey(currentTier,currentTarget),pool=cache[key]||[],seen=played[key]||new Set();if(!pool.length)return null;const u=q=>pool.reduce((a,p,i)=>{if(p.q>=q&&!seen.has(i))a.push(i);return a;},[]);let idx=u(70);if(!idx.length)idx=u(40);if(!idx.length)idx=pool.map((_,i)=>i).filter(i=>!seen.has(i));if(!idx.length){played[key]=new Set();idx=pool.map((_,i)=>i);}const pick=idx[Math.floor(Math.random()*idx.length)];seen.add(pick);return pool[pick];}

// ═══════════════════════════════════════════════════════════
//  PUZZLE LIFECYCLE
// ═══════════════════════════════════════════════════════════
function newPuzzle(){
  clearInterval(timerInterval);cancelAnimationFrame(rafId);
  expression=[];stepHistory=[];tileIdSeq=0;
  wheelAngle=0;wheelVel=0;
  hintUsed=false;solveUsed=false;
  currentPuzzle=pickPuzzle();
  if(!currentPuzzle){document.getElementById('wheelWrap').innerHTML='<div class="no-puzzles-msg"><strong>No Puzzles Loaded</strong>Run generate_puzzles.py and place JSON files alongside index.html.</div>';hideQuality();return;}
  tiles=currentPuzzle.n.map((n)=>makeTile(n,String(n),String(n),false));
  renderAll();hideFeedback();startTimer();updatePuzzleCount();
  document.getElementById('solvedOverlay').classList.remove('show');
}
function nextPuzzle(){document.getElementById('solvedOverlay').classList.remove('show');newPuzzle();}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function renderAll(){renderWheel();renderStepHistory();renderExpr();renderQuality();}

function getGeometry(){
  const wrap=document.getElementById('wheelWrap');
  const rect=wrap.getBoundingClientRect();
  const size=Math.min(rect.width,rect.height);
  const cardSize=Math.round(size*0.30);
  const orbitR=size*0.33;
  const cx=size/2, cy=size/2;
  return{size,cx,cy,cardSize,orbitR};
}

function renderWheel(){
  const wrap=document.getElementById('wheelWrap');
  wrap.querySelectorAll('.wheel-card').forEach(c=>c.remove());
  if(!currentPuzzle)return;
  const{cx,cy,cardSize,orbitR}=getGeometry();

  tiles.forEach((tile,i)=>{
    if(tile.empty)return;

    // Cards start at top (−π/2), spaced 90° apart, plus current wheelAngle
    const angle=-Math.PI/2+(i*Math.PI/2)+wheelAngle;
    const x=cx+orbitR*Math.cos(angle)-cardSize/2;
    const y=cy+orbitR*Math.sin(angle)-cardSize/2;

    const inExpr=expression.some(t=>t.type==='tile'&&t.tileId===tile.id);
    const originClass=tile.isIntermediate?'intermediate':`origin-${i}`;

    const card=document.createElement('div');
    card.className=['wheel-card',originClass,tile.consumed?'consumed':'',inExpr?'selected':''].filter(Boolean).join(' ');
    card.style.cssText=`width:${cardSize}px;height:${cardSize}px;left:${Math.round(x)}px;top:${Math.round(y)}px;`;

    // Underline 6 and 9 only
    const d=tile.display;
    const ul=(d==='6'||d==='9')?'underline69':'';
    card.innerHTML=`<span class="card-num${ul?' '+ul:''}">${d}</span>${tile.isIntermediate?`<span class="card-origin">${tile.originLabel}</span>`:''}`;

    if(!tile.consumed){
      card.addEventListener('pointerup',(e)=>{
        e.stopPropagation();
        if(!wasDrag) selectTile(tile.id);
      });
    }
    wrap.appendChild(card);
  });
}

function renderStepHistory(){const el=document.getElementById('stepHistory');el.innerHTML='';stepHistory.forEach(s=>{const row=document.createElement('div');row.className='step-row';row.innerHTML=`<span class="step-expr">${s.expr}</span><span class="step-result">= ${s.result}</span>`;el.appendChild(row);});}

function renderExpr(){const area=document.getElementById('exprArea');area.innerHTML='';if(!expression.length){area.innerHTML='<span class="expr-placeholder">Tap a number, then an operator, then another number…</span>';return;}expression.forEach((token,idx)=>{const span=document.createElement('span');span.className=`expr-token ${token.type==='tile'?'number':'operator'}`;span.textContent=token.display;span.addEventListener('click',()=>removeToken(idx));area.appendChild(span);});}

function renderQuality(){
  if(!currentPuzzle){hideQuality();return;}
  const{q,c,f}=currentPuzzle;
  const filled=Math.round(q/20),cls=filled>=4?'high':filled>=3?'mid':'low';
  const dotsEl=document.getElementById('qualityDots');dotsEl.innerHTML='';
  for(let i=1;i<=5;i++){const d=document.createElement('div');d.className=`q-dot${i<=filled?` filled ${cls}`:''}`;dotsEl.appendChild(d);}
  document.getElementById('qualityLabel').textContent=q>=70?'Great':q>=40?'Good':'Fair';
  document.getElementById('solutionsBadge').textContent=`${c} solution${c!==1?'s':''}`;
  document.getElementById('fractionBadge').style.display=f?'inline-block':'none';
}
function hideQuality(){document.getElementById('qualityDots').innerHTML='';document.getElementById('qualityLabel').textContent='';document.getElementById('solutionsBadge').textContent='';document.getElementById('fractionBadge').style.display='none';}
function updatePuzzleCount(){const pool=cache[cacheKey(currentTier,currentTarget)]||[];document.getElementById('puzzleCount').textContent=pool.length?`${pool.length.toLocaleString()} puzzles`:'';  }

// ═══════════════════════════════════════════════════════════
//  WHEEL DRAG
// ═══════════════════════════════════════════════════════════
function initWheelDrag(){
  const wrap=document.getElementById('wheelWrap');

  function pointerAngle(e){
    const rect=wrap.getBoundingClientRect();
    const{cx,cy}=getGeometry();
    const px=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const py=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    return Math.atan2(py-cy,px-cx);
  }

  function onStart(e){
    dragActive=true;wasDrag=false;
    dragLastAngle=pointerAngle(e);
    dragLastTime=performance.now();
    wheelVel=0;
    cancelAnimationFrame(rafId);
  }

  function onMove(e){
    if(!dragActive)return;
    e.preventDefault();
    const a=pointerAngle(e);
    let delta=a-dragLastAngle;
    if(delta>Math.PI)delta-=2*Math.PI;
    if(delta<-Math.PI)delta+=2*Math.PI;
    if(Math.abs(delta)>0.008)wasDrag=true;
    const now=performance.now();
    const dt=Math.max(now-dragLastTime,1);
    wheelVel=delta/dt*16;
    wheelAngle+=delta;
    dragLastAngle=a;
    dragLastTime=now;
    renderWheel();
  }

  function onEnd(){
    if(!dragActive)return;
    dragActive=false;
    // Momentum coast
    (function coast(){
      wheelVel*=0.91;
      if(Math.abs(wheelVel)>0.001){wheelAngle+=wheelVel;renderWheel();rafId=requestAnimationFrame(coast);}
    })();
  }

  wrap.addEventListener('mousedown',onStart);
  wrap.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchend',onEnd);
}

// ═══════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════
function selectTile(id){
  const tile=tiles.find(t=>t.id===id);
  if(!tile||tile.consumed)return;
  const existingIdx=expression.findIndex(t=>t.type==='tile'&&t.tileId===id);
  if(existingIdx!==-1){removeToken(existingIdx);return;}
  const tileCount=expression.filter(t=>t.type==='tile').length;
  if(tileCount>=2){showFeedback('Each step uses exactly 2 numbers','info');return;}
  const lastToken=expression[expression.length-1];
  if(tileCount===1&&lastToken?.type==='tile'){showFeedback('Add an operator first','info');return;}
  expression.push({type:'tile',tileId:id,display:tile.display,evalVal:tile.value});
  hideFeedback();renderWheel();renderExpr();
}

function addOp(op){
  const tileCount=expression.filter(t=>t.type==='tile').length;
  if(tileCount===0){showFeedback('Tap a number first','info');return;}
  if(tileCount===2){showFeedback('Press = to evaluate, or clear','info');return;}
  const last=expression[expression.length-1];
  if(last?.type==='op')expression.pop();
  expression.push({type:'op',display:op});
  hideFeedback();renderExpr();
}

function removeToken(idx){expression.splice(idx,1);renderWheel();renderExpr();hideFeedback();}
function clearStep(){expression=[];renderWheel();renderExpr();hideFeedback();}
function resetAll(){
  expression=[];stepHistory=[];tileIdSeq=0;wheelAngle=0;wheelVel=0;
  tiles=currentPuzzle.n.map(n=>makeTile(n,String(n),String(n),false));
  renderAll();hideFeedback();
}

// ═══════════════════════════════════════════════════════════
//  COMMIT STEP
// ═══════════════════════════════════════════════════════════
function commitStep(){
  const tileTokens=expression.filter(t=>t.type==='tile');
  const opTokens=expression.filter(t=>t.type==='op');
  if(tileTokens.length<2){showFeedback('Need two numbers and an operator','info');return;}
  if(opTokens.length<1){showFeedback('Add an operator between the numbers','info');return;}

  const evalStr=expression.map(t=>{if(t.type==='tile')return t.evalVal;if(t.display==='×')return'*';if(t.display==='÷')return'/';if(t.display==='−')return'-';return t.display;}).join('');
  let result;
  try{result=safeEval(String(evalStr));}catch{showFeedback('Invalid expression!','wrong');shakeExpr();return;}
  if(!isFinite(result)){showFeedback('Cannot divide by zero','wrong');shakeExpr();return;}

  const exprDisplay=expression.map(t=>t.display).join(' ');
  const resultDisplay=formatValue(result);
  stepHistory.push({expr:exprDisplay,result:resultDisplay});

  const usedIds=tileTokens.map(t=>t.tileId);
  tileTokens.forEach(t=>{const tile=tiles.find(ti=>ti.id===t.tileId);if(tile)tile.consumed=true;});

  const firstIdx=tiles.findIndex(t=>t.id===usedIds[0]);
  const secondIdx=tiles.findIndex(t=>t.id===usedIds[1]);
  tiles[firstIdx]=makeTile(result,resultDisplay,exprDisplay,true);
  tiles[secondIdx]={id:-1,display:'',value:0,originLabel:'',consumed:true,isIntermediate:false,empty:true};
  expression=[];

  const active=tiles.filter(t=>!t.consumed&&!t.empty);
  if(active.length===1){
    if(Math.abs(active[0].value-currentTarget)<1e-9){handleCorrect();return;}
    else{showFeedback(`Got ${formatValue(active[0].value)}, not ${currentTarget} — try Reset All`,'wrong');}
  }
  renderAll();
}

// ═══════════════════════════════════════════════════════════
//  WIN
// ═══════════════════════════════════════════════════════════
function handleCorrect(){
  const elapsed=Math.round((Date.now()-puzzleStartTime)/1000);
  const pts=Math.max(10,100+Math.max(0,timeLeft)*2-(hintUsed?30:0)-(solveUsed?80:0));
  score+=pts;solved++;streak++;
  if(bestTime===null||elapsed<bestTime)bestTime=elapsed;
  clearInterval(timerInterval);updateStats();

  const stepsEl=document.getElementById('solvedSteps');stepsEl.innerHTML='';
  stepHistory.forEach((s,i)=>{const l=document.createElement('div');l.className=i===stepHistory.length-1?'final-line':'';l.textContent=`${s.expr} = ${s.result}`;stepsEl.appendChild(l);});
  const pen=hintUsed||solveUsed?` · <span style="color:var(--accent2)">penalty applied</span>`:'';
  document.getElementById('solvedMeta').innerHTML=`+<strong>${pts}</strong> pts · solved in ${elapsed}s${pen}`;

  const altsEl=document.getElementById('solvedAlts');altsEl.innerHTML='';
  if(currentPuzzle?.s?.length){const lbl=document.createElement('div');lbl.className='solved-alts-label';lbl.textContent='One way to write it';altsEl.appendChild(lbl);const d=document.createElement('div');d.className='alt-soln';d.textContent=currentPuzzle.s[0];altsEl.appendChild(d);}

  document.getElementById('solvedOverlay').classList.add('show');
  document.getElementById('targetDisplay').classList.add('celebrate');
  setTimeout(()=>document.getElementById('targetDisplay').classList.remove('celebrate'),500);
  renderAll();
}

// ═══════════════════════════════════════════════════════════
//  HINT / SOLUTION
// ═══════════════════════════════════════════════════════════
function showHint(){if(!currentPuzzle?.s?.length){showFeedback('No hint available','info');return;}hintUsed=true;showFeedback(`Hint: try starting with ${currentPuzzle.s[0].match(/\d+/)?.[0]??'?'}  (−30 pts)`,'info');}
function showSolution(){if(!currentPuzzle?.s?.length){showFeedback('No solution available','info');return;}hintUsed=true;solveUsed=true;showFeedback(`Solution: ${currentPuzzle.s[0]}`,'info');}

// ═══════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════
function startTimer(){timeLeft=90;puzzleStartTime=Date.now();updateTimerDisplay();timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=0){clearInterval(timerInterval);streak=0;updateStats();showFeedback("Time's up!",'wrong');if(currentPuzzle?.s?.length)setTimeout(()=>showToast(`Solution: ${currentPuzzle.s[0]}`),500);}},1000);}
function updateTimerDisplay(){document.getElementById('timerBar').style.width=(timeLeft/90*100)+'%';document.getElementById('timerBar').classList.toggle('warn',timeLeft<20);document.getElementById('timerText').textContent=timeLeft+'s';}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function safeEval(e){return Function('"use strict";return('+e+')')();}
function updateStats(){document.getElementById('scoreDisplay').textContent=score;document.getElementById('solvedStat').textContent=solved;const hot=streak>=3?' fire-hot':'';document.getElementById('streakStat').innerHTML=`${streak} <span class="${hot.trim()}">🔥</span>`;document.getElementById('bestStat').textContent=bestTime!==null?bestTime+'s':'--';}
function showFeedback(msg,type){const el=document.getElementById('feedback');el.textContent=msg;el.className=`feedback show ${type}`;}
function hideFeedback(){document.getElementById('feedback').className='feedback';}
function shakeExpr(){const a=document.getElementById('exprArea');a.classList.remove('shake');void a.offsetWidth;a.classList.add('shake');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function showLoading(){document.getElementById('loadingOverlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');}
function setLoadingMsg(msg){document.getElementById('loadingMsg').textContent=msg;}

boot();
</script>
</body>
</html>
